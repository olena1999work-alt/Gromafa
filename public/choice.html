<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вибір | Animal Farm</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="choice">
  <div class="page-noise" aria-hidden="true"></div>
  <header class="site-header">
    <a class="logo" href="/index.html">Animal Farm</a>
    <nav class="site-nav" aria-label="Основна навігація">
      <a href="/index.html">Початок</a>
      <a href="/story.html">Сцени</a>
      <a href="/characters.html">Персонажі</a>
      <a href="/truth.html">Правда</a>
      <a class="is-active" href="/choice.html">Вибір</a>
      <a href="/final.html">Фінал</a>
    </nav>
  </header>

  <main class="shell">
    <section class="page-heading fade-in visible">
      <p class="section-label">Вузол напруги</p>
      <h1>Чи готовий ти ставити запитання?</h1>
      <p class="lead">Обери спокій або пошук правди. Система відповість одразу — але не однаково.</p>
    </section>

    <section class="choice-layout">
      <div class="choice-buttons reveal-on-scroll">
        <button class="choice-button" type="button" data-choice="silence">Не ставити запитань</button>
        <button class="choice-button choice-button-danger" type="button" data-choice="truth">Шукати правду</button>
      </div>

      <article id="choice-result" class="choice-result reveal-on-scroll">
        <p class="section-label">Результат</p>
        <h2>Сцена завмерла</h2>
        <p>Натисни одну з кнопок, щоб побачити, як змінюється тон вистави.</p>
      </article>
    </section>
  </main>

  <script src="/script.js" defer></script>
</body>
</html>
